# ==============================================================================
# Basic Site Settings
# ==============================================================================
locale                   : "en-US"
site_theme               : "default" 
title                    : "Chenhui Lv' homepage"
title_separator          : "-"
name                     : &name "Chenhui Lv"
description              : &description "Researcher in Algebraic Graph Theory"
url                      : https://academicpages.github.io 
baseurl                  : "" 
repository               : "academicpages/academicpages.github.io"

# ==============================================================================
# Site Author (Information saved here can be called in your markdown files)
# ==============================================================================
author:
  avatar           : "profile.png"
  name             : "Chenhui Lv"
  bio              : "Researcher in Algebraic Combinatorics"
  #location         : "China"
  employer         : "University of Science and Technology of China"
  uri              : "https://chenhui-lv.github.io"
  email            : "lch1994@mail.ustc.edu.cn" 
  arxiv            : "https://arxiv.org/search/advanced?advanced=&terms-0-operator=AND&terms-0-term=chenhui+lv&terms-0-field=all&classification-mathematics=y&classification-physics_archives=all&classification-include_cross_list=include&date-filter_by=all_dates&date-year=&date-from_date=&date-to_date=&date-date_type=submitted_date&abstracts=show&size=50&order=-announced_date_first"
  orcid            : "https://orcid.org/0009-0003-1261-1853"
  github           : "academicpages"

# ==============================================================================
# Collections & Categories
# ==============================================================================
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ==============================================================================
# Defaults (THIS CONTROLS THE SIDEBAR)
# Changing `author_profile` to false removes the sidebar globally.
# ==============================================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: false

# ==============================================================================
# Core Jekyll Settings
# ==============================================================================
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled" 
talkmap_link             : false      

include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed 

permalink: /:categories/:title/
timezone: Etc/UTC 

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
